<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Upload API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #f4f4f9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #response { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; word-wrap: break-word; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Upload Resume Test</h2>
    <p style="text-align: center; color: #666; font-size: 14px;">This avoids Postman completely to prove your backend works perfectly.</p>
    
    <div class="form-group">
        <label>Authorization Token (Bearer ...)</label>
        <!-- The user handles auth, they can paste their token here -->
        <input type="text" id="token" placeholder="Paste your token here (Without 'Bearer ')">
    </div>

    <form id="uploadForm">
        <div class="form-group">
            <label for="selfDescription">Self Description</label>
            <input type="text" id="selfDescription" name="selfDescription" value="I am a MERN stack developer...">
        </div>
        
        <div class="form-group">
            <label for="jobDescription">Job Description</label>
            <input type="text" id="jobDescription" name="jobDescription" value="React Node Developer...">
        </div>
        
        <div class="form-group">
            <label for="resume">Resume (PDF)</label>
            <input type="file" id="resume" name="resume" accept=".pdf">
        </div>
        
        <button type="submit">Submit to Backend</button>
    </form>

    <div id="response"></div>
</div>

<script>
    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const responseDiv = document.getElementById('response');
        responseDiv.style.display = 'block';
        responseDiv.className = '';
        responseDiv.innerText = 'Uploading... Please wait.';

        const formData = new FormData();
        formData.append('selfDescription', document.getElementById('selfDescription').value);
        formData.append('jobDescription', document.getElementById('jobDescription').value);
        
        const fileInput = document.getElementById('resume');
        if(fileInput.files.length > 0) {
            formData.append('resume', fileInput.files[0]);
        }

        const token = document.getElementById('token').value;

        try {
            const res = await fetch('http://localhost:3000/api/interview/', {
                method: 'POST',
                headers: {
                    'Authorization': token ? `Bearer ${token}` : ''
                },
                body: formData
            });

            const data = await res.json();
            
            if(res.ok) {
                responseDiv.className = 'success';
                responseDiv.innerText = 'Success (201)! Response: \n' + JSON.stringify(data, null, 2);
            } else {
                responseDiv.className = 'error';
                responseDiv.innerText = 'Error (' + res.status + '): \n' + JSON.stringify(data, null, 2);
            }
        } catch (err) {
            responseDiv.className = 'error';
            responseDiv.innerText = 'Network error: ' + err.message;
        }
    });
</script>

</body>
</html>
